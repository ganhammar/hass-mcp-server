name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate
    steps:
      - uses: actions/checkout@v5

      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration

      - name: Hassfest Validation
        uses: home-assistant/actions/hassfest@master

  test:
    runs-on: ubuntu-latest
    name: test
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: poetry install --no-interaction

    - name: Check formatting with Black
      run: poetry run black --check custom_components/ tests/

    - name: Lint with Ruff
      run: poetry run ruff check custom_components/ tests/

    - name: Run unit tests
      run: poetry run pytest tests/ -v --ignore=tests/test_integration.py --ignore=tests/test_e2e.py --ignore=tests/test_e2e_oidc.py

    - name: Run tests with coverage
      run: poetry run pytest tests/ --ignore=tests/test_integration.py --ignore=tests/test_e2e.py --ignore=tests/test_e2e_oidc.py --cov=custom_components.mcp_server_http_transport --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: false

  integration-test:
    runs-on: ubuntu-latest
    name: integration (py${{ matrix.python-version }}, HA ${{ matrix.ha-version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.14"
            ha-version: "2026.4.2"
            ha-test-helper: "0.13.323"
          - python-version: "3.13"
            ha-version: "2025.10.1"
            ha-test-helper: "0.13.286"
            extra-deps: "pycares<5"
          - python-version: "3.13"
            ha-version: "2025.4.4"
            ha-test-helper: "0.13.236"

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m venv .venv
        .venv/bin/pip install "pytest-homeassistant-custom-component==${{ matrix.ha-test-helper }}" mcp
        if [ -n "$EXTRA_DEPS" ]; then .venv/bin/pip install $EXTRA_DEPS; fi
      env:
        EXTRA_DEPS: ${{ matrix.extra-deps }}

    # Vendor the paired OIDC provider so the audience-contract tests in
    # test_e2e_oidc.py run against the real validate_access_token. Pinned to a
    # provider commit for reproducibility; bump deliberately to test newer
    # provider versions.
    - name: Vendor paired OIDC provider
      env:
        OIDC_PROVIDER_REF: e1b6b18ed7d4a3155541a900281ba05db170c365
      run: |
        git clone --filter=blob:none https://github.com/ganhammar/hass-oidc-server.git /tmp/oidc-provider
        git -C /tmp/oidc-provider checkout "$OIDC_PROVIDER_REF"
        cp -r /tmp/oidc-provider/custom_components/oidc_provider custom_components/oidc_provider

    - name: Run integration and end-to-end tests
      run: .venv/bin/pytest tests/test_integration.py tests/test_e2e.py tests/test_e2e_oidc.py -v
