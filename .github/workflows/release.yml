name: Release

on:
  release:
    types:
      - published

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Zip integration
        run: |
          cd custom_components/mcp_server_http_transport
          zip -r ../../mcp_server_http_transport.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: mcp_server_http_transport.zip
